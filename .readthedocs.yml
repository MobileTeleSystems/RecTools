version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  jobs:
    pre_build:
      - cp -r examples docs/source/
    post_create_environment:
      - pip install --no-cache-dir poetry
    post_install:
      - poetry install -E all --with docs

sphinx:
  builder: html
  configuration: docs/source/conf.py
  fail_on_warning: false

python:
   install:
   - requirements: docs/requirements.txt

formats:
  - pdf
